---
name: "Build Containers"

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  build-containers-common:
    runs-on: ubuntu-latest
    outputs:
      containerver: ${{ steps.getcontainerver.outputs.containerver }}
    steps:
      - name: Get Container Version
        id: getcontainerver
        run: |
          echo "containerver=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

  build-containers:
    needs: build-containers-common
    strategy:
      matrix:
        include:
          - runnertags: ubuntu-latest
            arch: amd64
          - runnertags: macos-latest
            arch: arm64

    runs-on: ${{ matrix.runnertags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install and Start Docker (macOS Only)
        if: runner.os == 'macOS'
        run: |
          brew install docker colima docker-buildx qemu
          colima start --vm-type qemu

      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: docker build
        run: ./docker/docker-build.sh

      - name: Print post-build debug info
        run: |
          docker images

      - name: docker tag
        env:
          CONTAINERVER: ${{ needs.build-containers-common.outputs.containerver }}
        run: |
          docker tag localhost/agentheroes ghcr.io/agentheroes/agentheroes:${{ env.CONTAINERVER }}-${{ matrix.arch }}
          docker push ghcr.io/agentheroes/agentheroes:${{ env.CONTAINERVER }}-${{ matrix.arch }}

  build-container-manifest:
    needs: [build-containers, build-containers-common]
    runs-on: ubuntu-latest
    steps:
      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create Docker Manifest
        env:
          CONTAINERVER: ${{ needs.build-containers-common.outputs.containerver }}
        run: |
          docker manifest create ghcr.io/agentheroes/agentheroes:latest ghcr.io/agentheroes/agentheroes:${{ env.CONTAINERVER }}-amd64 ghcr.io/agentheroes/agentheroes:${{ env.CONTAINERVER }}-arm64

          docker manifest push ghcr.io/agentheroes/agentheroes:latest
