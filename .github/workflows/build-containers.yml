name: "Build Containers"

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  build-containers-common:
    runs-on: ubuntu-latest
    outputs:
      containerver: ${{ steps.getcontainerver.outputs.containerver }}
    steps:
      - name: Get Container Version
        id: getcontainerver
        run: |
          echo "containerver=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

  build-containers:
    needs: build-containers-common
    strategy:
      matrix:
        include:
          - runnertags: ubuntu-latest
            arch: amd64
          - runnertags: ubuntu-latest
            arch: arm64

    runs-on: ${{ matrix.runnertags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU (For ARM64 Builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        env:
          CONTAINERVER: ${{ needs.build-containers-common.outputs.containerver }}
        run: |
          docker buildx build --platform linux/${{ matrix.arch }} \
            -t ghcr.io/agentheroes/agentheroes:${{ env.CONTAINERVER }}-${{ matrix.arch }} --push .

  build-container-manifest:
    needs: [build-containers, build-containers-common]
    runs-on: ubuntu-latest
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and Push Docker Manifest
        env:
          CONTAINERVER: ${{ needs.build-containers-common.outputs.containerver }}
        run: |
          docker manifest create ghcr.io/agentheroes/agentheroes:${{ env.CONTAINERVER }} \
            ghcr.io/agentheroes/agentheroes:${{ env.CONTAINERVER }}-amd64 \
            ghcr.io/agentheroes/agentheroes:${{ env.CONTAINERVER }}-arm64

          docker manifest push ghcr.io/agentheroes/agentheroes:${{ env.CONTAINERVER }}

          docker manifest create ghcr.io/agentheroes/agentheroes:latest \
            ghcr.io/agentheroes/agentheroes:${{ env.CONTAINERVER }}-amd64 \
            ghcr.io/agentheroes/agentheroes:${{ env.CONTAINERVER }}-arm64

          docker manifest push ghcr.io/agentheroes/agentheroes:latest

      - name: Verify Manifest
        run: |
          docker manifest inspect ghcr.io/agentheroes/agentheroes:latest